name: Build custom headscale image (pernode-derpmap)

on:
  push:
    branches: [feat/pernode-derpmap]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    outputs:
      image: ghcr.io/vanbienperu3107/headscale:0.27.1-pernode
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/vanbienperu3107/headscale:0.27.1-pernode
            ghcr.io/vanbienperu3107/headscale:latest-pernode
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=0.27.1-pernode

  deploy:
    name: Deploy headscale to vpn2
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH vào vpn2 và restart headscale
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script_stop: true
          command_timeout: 5m
          script: |
            set -e
            if [ "$(id -u)" -ne 0 ]; then SUDO="sudo"; else SUDO=""; fi

            IMAGE="ghcr.io/vanbienperu3107/headscale:0.27.1-pernode"
            echo "==> Pull image mới: $IMAGE"
            if [ -n "$GHCR_PAT" ]; then
              printf '%s' "$GHCR_PAT" | $SUDO docker login ghcr.io -u "${GHCR_USER:-vanbienperu3107}" --password-stdin
            fi
            $SUDO docker pull "$IMAGE"

            echo "==> Restart headscale container"
            cd "$DEPLOY_PATH"
            $SUDO docker compose up -d --no-deps --force-recreate headscale

            echo "==> Chờ headscale healthy (tối đa 30s)"
            for i in $(seq 1 10); do
              sleep 3
              status=$($SUDO docker inspect --format='{{.State.Health.Status}}' headscale 2>/dev/null || echo "none")
              echo "  attempt $i: $status"
              if [ "$status" = "healthy" ] || $SUDO docker exec headscale headscale version >/dev/null 2>&1; then
                echo "==> headscale UP - deploy thành công"
                $SUDO docker logs --tail 20 headscale 2>&1
                exit 0
              fi
            done
            echo "==> WARN: headscale chưa healthy sau 30s, kiểm tra log:"
            $SUDO docker logs --tail 30 headscale 2>&1
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_PAT:    ${{ secrets.GHCR_PAT }}
          GHCR_USER:   vanbienperu3107
