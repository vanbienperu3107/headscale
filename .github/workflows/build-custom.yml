name: Build custom headscale image (pernode-derpmap)

on:
  push:
    branches: [feat/pernode-derpmap]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/vanbienperu3107/headscale:0.27.1-pernode
            ghcr.io/vanbienperu3107/headscale:latest-pernode
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=0.27.1-pernode
