name: Build custom headscale image (pernode-derpmap)

on:
  push:
    branches: [feat/pernode-derpmap]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5730b5a3e73f1a367e6cc06e8daeaf9bff1c756 # v3.10.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@1dc73863535b631f98b2378be8619f83b136f4b0 # v6.17.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/vanbienperu3107/headscale:0.27.1-pernode
            ghcr.io/vanbienperu3107/headscale:latest-pernode
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=0.27.1-pernode
